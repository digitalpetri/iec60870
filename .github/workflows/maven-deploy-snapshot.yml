name: Maven Deploy Snapshot
permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Maven Central Repository
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      # Central snapshots are not signed, so no GPG key is needed here. Only
      # iec60870-core and iec60870-transport-tcp are published; the other modules
      # skip the deploy plugin in their POMs.
      - name: Publish snapshot
        run: mvn -B clean deploy -P deploy-snapshot
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_SONATYPE_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_SONATYPE_TOKEN_PASSWORD }}
