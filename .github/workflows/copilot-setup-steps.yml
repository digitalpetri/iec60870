name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Install
        run: mvn -B -V install -DskipTests=true -Dmaven.javadoc.skip=true

      # The download-external-src profile binds to the `package` phase in this
      # project (see AGENTS.md), unpacking dependency sources into external/src.
      - name: Download external sources
        run: mvn -B -q package -DskipTests -Pdownload-external-src
